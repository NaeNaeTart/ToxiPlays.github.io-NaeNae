

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTML Renderer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8f440;
    --accent2: #ff4d6d;
    --text-dim: #3a3a55;
    --text-mid: #6a6a9a;
    --text-bright: #c8c8e8;
    --active-word: #e8f440;
    --active-line: rgba(232,244,64,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text-bright);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    width: 100%;
    max-width: 780px;
    padding: 3rem 2rem 1rem;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
  }

  header span {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-mid);
    text-transform: uppercase;
  }

  /* Upload zone */
  .upload-panel {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .drop-zone {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 1.5rem;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    min-height: 90px;
    justify-content: center;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,244,64,0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-zone .label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  .drop-zone .hint {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .drop-zone .filename {
    font-size: 0.85rem;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Player */
  .player-bar {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem 1.5rem;
  }

  .player-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .btn-play {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-play:hover { background: #f5ff6e; }
  .btn-play:active { transform: scale(0.94); }
  .btn-play svg { fill: #0a0a0f; }

  .time-display {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--text-mid);
    flex-shrink: 0;
    min-width: 90px;
  }

  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
  }

  .progress-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    left: 0%;
    transition: left 0.1s linear;
  }

  input[type="range"].seek {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type="range"].seek::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  /* Lyrics */
  .lyrics-outer {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem 4rem;
    flex: 1;
  }

  #lyrics-container {
    height: 60vh;
    overflow-y: auto;
    scrollbar-width: none;
    padding: 2rem 0;
    scroll-behavior: smooth;
  }

  #lyrics-container::-webkit-scrollbar { display: none; }

  .lyric-line {
    padding: 0.5rem 0;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    line-height: 1.7;
    color: var(--text-dim);
    transition: color 0.3s;
    margin-bottom: 0.2rem;
    display: block;
    max-width: 85%;
    word-break: break-word;
  }

  .lyric-line.active-line {
    color: var(--text-mid);
  }

  .lyric-line[data-agent="v2"] {
    text-align: right;
    margin-left: auto;
  }

  .lyric-span {
    display: inline-block;
    transition: color 0.08s, text-shadow 0.08s;
    cursor: pointer;
    transform: translateY(2px);
    vertical-align: baseline;
    word-break: keep-all;
  }

  .lyric-span:hover {
    color: var(--text-bright);
  }

  @keyframes word-jitter {
    0%   { transform: translateY(2px); }
    40%  { transform: translateY(5px); }
    100% { transform: translateY(5px); }
  }

  @keyframes float-up {
    from { transform: translateY(5px); }
    to   { transform: translateY(0px); }
  }

  .lyric-span.active {
    color: var(--active-word);
    text-shadow: 0 0 20px rgba(232,244,64,0.4);
    animation:
      word-jitter 60ms linear forwards,
      float-up var(--word-dur, 0.3s) cubic-bezier(0.22, 1, 0.36, 1) forwards 60ms;
  }

  .lyric-span.past {
    color: var(--text-bright);
    transform: translateY(0px);
  }

  /* Long-held word glow animation */
  @keyframes word-glow {
    0%   { text-shadow: 0 0 10px rgba(232,244,64,0.5); }
    50%  { text-shadow: 0 0 30px rgba(232,244,64,0.9), 0 0 60px rgba(232,244,64,0.4); }
    100% { text-shadow: 0 0 10px rgba(232,244,64,0.5); }
  }

  .lyric-span.active.long-word {
    animation:
      word-jitter 60ms linear forwards,
      float-up var(--word-dur, 0.3s) cubic-bezier(0.22, 1, 0.36, 1) forwards 60ms,
      word-glow 0.8s ease-in-out infinite 60ms;
  }

  /* Word group: wraps multi-syllable spans to prevent mid-word line breaks */
  .word-group {
    display: inline-block;
    white-space: nowrap;
    vertical-align: baseline;
  }

  /* Ad-lib lines */
  .lyric-line.adlib {
    font-size: 0.9em;
    opacity: 0.6;
    margin-top: -0.4rem;
    padding-top: 0;
    display: block;
  }

  /* Instrumental break bar */
  .break-bar {
    margin: 0.8rem 0;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .break-bar-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .break-bar-track {
    flex: 1;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .break-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--accent);
    transition: width 0.1s linear;
  }

  .btn-render {
    width: 36px;
    height: 36px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-render:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-render:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-render.rendering { border-color: var(--accent2); color: var(--accent2); animation: pulse 1s infinite; }

  /* Render progress overlay */
  #render-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    z-index: 2000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }
  #render-overlay.active { display: flex; }
  #render-overlay .render-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  #render-overlay .render-sub {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-mid);
  }
  #render-overlay .render-bar-track {
    width: 320px;
    height: 3px;
    background: var(--border);
    position: relative;
  }
  #render-overlay .render-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }
  #render-overlay .render-cancel {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
  }
  #render-overlay .render-cancel:hover { color: var(--accent2); }
  #render-preview {
    width: 320px;
    height: 180px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #000;
    image-rendering: pixelated;
  }
  .songwriter-credit {
    font-size: 0.75em;
    opacity: 0.45;
    color: var(--text-bright);
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
    display: block;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 1rem;
    color: var(--text-dim);
  }

  .empty-state .big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 0.1em;
    line-height: 1;
    color: var(--border);
  }

  .empty-state .sub {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* divider */
  .divider {
    width: 100%;
    max-width: 780px;
    padding: 0 2rem;
    margin-bottom: 1rem;
  }
  .divider-line {
    height: 1px;
    background: var(--border);
  }

  audio { display: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .recording-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 1s infinite;
    margin-right: 6px;
  }

  a {
    color: var(--accent);
    text-decoration: none;
  }
  a:hover { opacity: 0.8; }

  /* ─── Contributors Dropdown ─── */
  .contributors-wrap {
    position: relative;
    display: inline-flex;
    align-items: baseline;
  }

  .contributors-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-mid);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0;
    margin-left: 0.4rem;
    opacity: 0.6;
    transition: opacity 0.2s, color 0.2s;
    vertical-align: baseline;
  }
  .contributors-btn:hover { opacity: 1; color: var(--accent); }

  .contributors-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem 1.2rem;
    min-width: 260px;
    z-index: 500;
    flex-direction: column;
    gap: 0.6rem;
  }
  .contributors-menu.open { display: flex; }

  .contributors-menu-title {
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-mid);
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.2rem;
  }

  .contributors-menu .entry {
    font-size: 0.65rem;
    color: var(--text-bright);
    line-height: 1.6;
    letter-spacing: 0.04em;
  }
  .contributors-menu .entry.muted {
    font-size: 0.6rem;
    color: var(--text-mid);
    margin-top: 0.2rem;
  }

  /* ─── Design Panel (Customizer) ─── */
  .design-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-mid);
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    margin-left: auto;
    flex-shrink: 0;
  }
  .design-toggle:hover { border-color: var(--accent); color: var(--accent); }

  .design-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 280px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 1500;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .design-panel::-webkit-scrollbar { display: none; }
  .design-panel.active { transform: translateX(0); }

  .design-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .design-header span {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-mid);
  }
  .design-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.25rem;
  }
  .design-close:hover { color: var(--accent); }

  .design-section { display: flex; flex-direction: column; gap: 1rem; }
  .design-section-title {
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-mid);
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .design-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .design-group label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .design-color-row { display: flex; align-items: stretch; gap: 0; }
  .design-color-row input[type="color"] {
    width: 36px; height: 30px;
    border: 1px solid var(--border);
    border-right: none;
    background: var(--bg);
    cursor: pointer;
    padding: 2px;
    flex-shrink: 0;
  }
  .design-color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  .design-color-row input[type="color"]::-webkit-color-swatch { border: none; }
  .design-color-row input[type="text"].hex-input {
    flex: 1;
    min-width: 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--text-bright);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.3rem 0.5rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .design-color-row input[type="text"].hex-input:focus { border-color: var(--accent); }

  .design-reset {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: auto;
  }
  .design-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  .design-check-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-bright);
  }
  .design-check-label input[type="checkbox"] {
    accent-color: var(--accent);
    width: 13px;
    height: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>TTML Renderer</h1>
  <div class="contributors-wrap">
    <span>v3.0.0 by <a href="https://spicylyrics.org/toxi" target="_blank" rel="noopener noreferrer">@toxi</a></span>
    <button class="contributors-btn" id="contributors-btn" title="View contributors">▾</button>
    <div class="contributors-menu" id="contributors-menu">
      <div class="contributors-menu-title">Contributors</div>
      <div class="entry"><a href="https://spicylyrics.org/toxi" target="_blank" rel="noopener noreferrer">@toxi</a> — base code</div>
      <div class="entry"><a href="https://genius.com/gooncave" target="_blank" rel="noopener noreferrer">alex</a> — color-changing code</div>
      <div class="entry muted">Special thanks to <a href="https://github.com/Steve-xmh" target="_blank" rel="noopener noreferrer">SteveXMH</a> for the <a href="https://amll-ttml-tool.stevexmh.net/" target="_blank" rel="noopener noreferrer">AMLL TTML tool</a></div>
    </div>
  </div>
  <button class="design-toggle" id="btn-design" title="Design Settings">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
      <line x1="2" y1="3.5" x2="12" y2="3.5"/>
      <line x1="2" y1="7" x2="12" y2="7"/>
      <line x1="2" y1="10.5" x2="12" y2="10.5"/>
      <circle cx="4.5" cy="3.5" r="1.3" fill="currentColor"/>
      <circle cx="9.5" cy="7" r="1.3" fill="currentColor"/>
      <circle cx="6" cy="10.5" r="1.3" fill="currentColor"/>
    </svg>
  </button>
</header>

<div class="upload-panel">
  <div class="drop-zone" id="ttml-drop">
    <input type="file" id="ttml-input" accept=".ttml,.xml">
    <div class="label">Lyrics file</div>
    <div class="hint" id="ttml-hint">Drop .ttml here</div>
    <div class="filename" id="ttml-name" style="display:none"></div>
  </div>
  <div class="drop-zone" id="audio-drop">
    <input type="file" id="audio-input" accept="audio/*">
    <div class="label">Audio file</div>
    <div class="hint" id="audio-hint">Drop audio here</div>
    <div class="filename" id="audio-name" style="display:none"></div>
  </div>
</div>

<div class="divider"><div class="divider-line"></div></div>

<div class="player-bar">
  <div class="player-inner">
    <div class="controls">
      <button class="btn-play" id="btn-play" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16">
          <polygon id="play-icon" points="4,2 14,8 4,14"/>
        </svg>
      </button>
      <div class="time-display">
        <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
      </div>
      <input type="range" class="seek" id="seek-bar" min="0" max="100" value="0" step="0.01" disabled>
      <button class="btn-render" id="btn-render" disabled title="Export to video">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 5-10 5V2z" fill="currentColor"/>
          <rect x="1" y="11.5" width="12" height="1.5" fill="currentColor" rx="0.75"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="lyrics-outer">
  <div id="lyrics-container">
    <div class="empty-state">
      <div class="big">LYRICS</div>
      <div class="sub">Upload a .ttml file to begin</div>
    </div>
  </div>
</div>

<div id="render-overlay">
  <div class="render-title">Rendering</div>
  <canvas id="render-preview" width="320" height="180"></canvas>
  <div class="render-sub" id="render-sub">Preparing…</div>
  <div class="render-bar-track"><div class="render-bar-fill" id="render-bar-fill"></div></div>
  <button class="render-cancel" id="render-cancel">Cancel</button>
</div>

<div id="design-panel" class="design-panel">
  <div class="design-header">
    <span>Design</span>

<script>
// ─── Render preview thumbnail ─────────────────────────────────────────────────
// Shared by both export modes. Call updateRenderPreview(sourceCanvas) after
// each frame draw; it scales the frame down to the 320×180 overlay thumbnail.
// Internally throttled to one update every 6 s so real-time paths don't pay
// the cost of a drawImage on every single tick.
const _previewCanvas = document.getElementById('render-preview');
const _previewCtx    = _previewCanvas.getContext('2d');
let _previewLastMs   = 0;
const PREVIEW_THROTTLE_MS = 10000;
function updateRenderPreview(src, force) {
  const now = performance.now();
  if (!force && now - _previewLastMs < PREVIEW_THROTTLE_MS) return;
  _previewLastMs = now;
  _previewCtx.drawImage(src, 0, 0, _previewCanvas.width, _previewCanvas.height);
}
function clearRenderPreview() {
  _previewCtx.clearRect(0, 0, _previewCanvas.width, _previewCanvas.height);
}

// ─── State ────────────────────────────────────────────────────────────────────
let spans = []; // { el, begin, end, duration, isLong, lineEl }
let lines = []; // { el, begin, end }
let breakBars = []; // { el, fillEl, start, end, gap }
let rafId = null;
let activeSpanSet = new Set();
let activeLineSet = new Set();
const btnPlay = document.getElementById('btn-play');
const playIcon = document.getElementById('play-icon');

// ─── Helpers ──────────────────────────────────────────────────────────────────
function parseTime(str) {
  if (!str) return 0;
  // formats: HH:MM:SS.mmm  MM:SS.mmm  SS.mmm
  const parts = str.split(':');
  let secs = 0;
  if (parts.length === 3) {
    secs = (+parts[0]) * 3600 + (+parts[1]) * 60 + parseFloat(parts[2]);
  } else if (parts.length === 2) {
    secs = (+parts[0]) * 60 + parseFloat(parts[1]);
  } else {
    secs = parseFloat(parts[0]);
  }
  return secs;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ─── TTML Parser ──────────────────────────────────────────────────────────────
function parseTTML(xmlString) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlString, 'text/xml');

  const ns = 'http://www.w3.org/ns/ttml';
  const ttmNS = 'http://www.w3.org/ns/ttml#metadata';

  const container = document.getElementById('lyrics-container');
  container.innerHTML = '';
  spans = [];
  lines = [];
  breakBars = [];

  // ── Check for XML parse error ──
  const xmlErr = doc.querySelector('parsererror');
  if (xmlErr) {
    const msg = xmlErr.textContent.split('\n')[0].trim();
    container.innerHTML = `<div class="empty-state">
      <div class="big">INVALID FILE</div>
      <div class="sub">The file could not be read as XML.<br><em>${msg}</em><br><br>Make sure the file is a valid .ttml file and try again.</div>
    </div>`;
    return;
  }

  // ── Find <p> elements — try namespaced first, then unqualified fallback ──
  let pEls = doc.getElementsByTagNameNS(ns, 'p');
  if (pEls.length === 0) pEls = doc.getElementsByTagName('p');
  if (pEls.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="big">NO LYRICS FOUND</div>
      <div class="sub">The file was read successfully but contains no lyric lines.<br>Check that it is a TTML lyric file (not a subtitle or caption file) and try again.</div>
    </div>`;
    return;
  }

  Array.from(pEls).forEach((p) => {
    const agent = p.getAttributeNS(ttmNS, 'agent') || p.getAttribute('ttm:agent') || 'v1';
    const lineBegin = parseTime(p.getAttribute('begin'));
    const lineEnd   = parseTime(p.getAttribute('end'));

    // ── Collect all timed tokens from this <p>, preserving inter-span text nodes ──
    // Each token is either:
    //   { type:'text', text }            — a raw text node (space/punctuation)
    //   { type:'span', begin, end, text, wordDuration } — a timed word span
    const tokens = [];

    function collectTokens(node, forceAdlib) {
      node.childNodes.forEach(child => {
        if (child.nodeType === Node.TEXT_NODE) {
          if (child.textContent) tokens.push({ type: 'text', text: child.textContent, isAdlib: !!forceAdlib });
        } else if (child.nodeType === Node.ELEMENT_NODE && child.localName === 'span') {
          const b = child.getAttribute('begin');
          const e = child.getAttribute('end');
          // Detect x-bg (background vocal / ad-lib container) — always recurse into it
          const role = child.getAttributeNS(ttmNS, 'role') || child.getAttribute('ttm:role') || '';
          const isXBg = role === 'x-bg';
          // Skip non-lyric annotation spans (x-roman, x-translation, etc.)
          if (role && role !== 'x-bg') return;
          if (isXBg) {            // Recurse, flagging all children as ad-lib
            collectTokens(child, true);
          } else if (b && e) {
            const begin = parseTime(b), end = parseTime(e);
            const text = child.textContent;
            tokens.push({ type: 'span', begin, end, wordDuration: end - begin, text, isAdlib: !!forceAdlib });
          } else {
            // Other structural span — recurse, inherit adlib flag
            collectTokens(child, forceAdlib);
          }
        }
      });
    }
    collectTokens(p, false);

    // ── Split tokens into mainTokens and adlibTokens using the isAdlib flag ──
    // x-bg spans are already flagged isAdlib=true by collectTokens.
    // For non-x-bg files that use parentheses in text, fall back to paren detection.
    const hasXBgAdlib = tokens.some(t => t.isAdlib);

    let mainTokens, adlibTokens;
    if (hasXBgAdlib) {
      // Clean split: main = non-adlib tokens, adlib = adlib tokens
      mainTokens  = tokens.filter(t => !t.isAdlib);
      adlibTokens = tokens.filter(t => t.isAdlib);
      // Trim trailing text-only tokens from main (spaces left over before adlib)
      while (mainTokens.length && mainTokens[mainTokens.length - 1].type === 'text') mainTokens.pop();
    } else {
      // Paren-based fallback
      const fullText = tokens.map(t => t.text).join('').trim();
      const entireLineIsAdlib = fullText.startsWith('(');
      let splitIdx = -1;
      for (let i = 0; i < tokens.length; i++) {
        const tok = tokens[i];
        if (tok.text && tok.text.includes('(')) { splitIdx = i; break; }
      }
      if (entireLineIsAdlib) {
        mainTokens = []; adlibTokens = tokens;
      } else if (splitIdx >= 0) {
        mainTokens = tokens.slice(0, splitIdx);
        adlibTokens = tokens.slice(splitIdx);
        while (mainTokens.length && mainTokens[mainTokens.length - 1].type === 'text') mainTokens.pop();
      } else {
        mainTokens = tokens; adlibTokens = [];
      }
    }

    // ── Build a DOM line element from a token list ──
    // Groups consecutive span tokens that have NO whitespace text node between them
    // into a <span class="word-group"> so the browser never breaks mid-syllable.
    function buildLine(tokenList, isAdlib) {
      const lineEl = document.createElement('div');
      lineEl.className = 'lyric-line' + (isAdlib ? ' adlib' : '');
      lineEl.dataset.agent = agent;

      // Compute line timing from its span tokens
      const spanToks = tokenList.filter(t => t.type === 'span');
      const lb = spanToks.length ? spanToks[0].begin : lineBegin;
      const le = spanToks.length ? spanToks[spanToks.length - 1].end : lineEnd;
      lineEl.dataset.begin = lb;
      lineEl.dataset.end   = le;

      // Strip parens from adlib lines always (x-bg or paren-fallback)
      const processedTokens = isAdlib
        ? stripParensFromTokens(tokenList)
        : tokenList;

      // Group consecutive span tokens (no whitespace between) into word-group wrappers
      // so line-breaking never splits a multi-syllable word mid-span.
      // We walk tokens and whenever we see span-span adjacency (no space text node between),
      // we collect them into a group.
      let i = 0;
      while (i < processedTokens.length) {
        const tok = processedTokens[i];
        if (tok.type === 'text') {
          lineEl.appendChild(document.createTextNode(tok.text));
          i++;
        } else {
          // Collect a run of spans separated only by empty/no text nodes
          const group = [tok];
          let j = i + 1;
          // Also end the group if this span's own text ends with whitespace
          if (!/\s$/.test(tok.text)) {
            while (j < processedTokens.length) {
              const next = processedTokens[j];
              if (next.type === 'text') {
                if (/\S/.test(next.text)) break; // real content = group ends
                const afterSpace = processedTokens[j + 1];
                if (!afterSpace || afterSpace.type !== 'span') break;
                break; // whitespace between spans = word boundary
              } else {
                // Adjacent span — check if previous ended with space before adding
                group.push(next);
                j++;
                if (/\s$/.test(next.text)) break; // trailing space = word boundary
              }
            }
          }

          if (group.length === 1) {
            // Single span — emit directly
            appendSpanWithTrail(lineEl, group[0]);
          } else {
            // Multi-syllable word — wrap in a non-breaking group
            appendGroupWithTrail(lineEl, group);
          }
          i = j;
        }
      }

      return { lineEl, begin: lb, end: le };
    }

    function makeSpanEl(tok) {
      const spanEl = document.createElement('span');
      spanEl.className = 'lyric-span';
      spanEl.dataset.begin = tok.begin;
      spanEl.dataset.end   = tok.end;
      spanEl.dataset.duration = tok.wordDuration;
      // Strip trailing whitespace from display text — it will be emitted as a
      // separate text node after the span so inline-block gaps render correctly.
      spanEl.textContent = tok.text.trimEnd();
      spanEl.style.setProperty('--word-dur', tok.wordDuration.toFixed(3) + 's');
      spanEl.addEventListener('click', () => seekToTime(tok.begin));
      spans.push({ el: spanEl, begin: tok.begin, end: tok.end, duration: tok.wordDuration, lineEl: null /* set below */ });
      return spanEl;
    }

    // Emit a span (or word-group) plus any trailing space as a sibling text node
    function appendSpanWithTrail(parent, tok) {
      const el = makeSpanEl(tok);
      parent.appendChild(el);
      const trail = tok.text.match(/\s+$/);
      if (trail) parent.appendChild(document.createTextNode(trail[0]));
    }

    function appendGroupWithTrail(parent, group) {
      const lastTok = group[group.length - 1];
      const trail = lastTok.text.match(/\s+$/);
      if (group.length === 1) {
        appendSpanWithTrail(parent, group[0]);
      } else {
        const wrapper = document.createElement('span');
        wrapper.className = 'word-group';
        group.forEach(t => wrapper.appendChild(makeSpanEl(t)));
        parent.appendChild(wrapper);
        if (trail) parent.appendChild(document.createTextNode(trail[0]));
      }
    }

    // Build main line
    if (mainTokens.some(t => t.type === 'span')) {
      const { lineEl, begin, end } = buildLine(mainTokens, false);
      // Patch lineEl reference on spans added during this buildLine call
      lineEl.querySelectorAll('.lyric-span').forEach(el => {
        const s = spans.find(s => s.el === el && s.lineEl === null);
        if (s) s.lineEl = lineEl;
      });
      container.appendChild(lineEl);
      lines.push({ el: lineEl, begin, end });
    }

    // Build adlib line
    if (adlibTokens.some(t => t.type === 'span')) {
      const { lineEl, begin, end } = buildLine(adlibTokens, true);
      lineEl.querySelectorAll('.lyric-span').forEach(el => {
        const s = spans.find(s => s.el === el && s.lineEl === null);
        if (s) s.lineEl = lineEl;
      });
      // Flag adlib lines that contain overlapping timing layers (indicated by ';' in span text)
      const hasOverlap = adlibTokens.some(t => t.type === 'span' && t.text.includes(';'));
      container.appendChild(lineEl);
      lines.push({ el: lineEl, begin, end, skipRetroactive: hasOverlap });
    }
  });

  // Compute long-word threshold: median word duration * 3
  if (spans.length > 0) {
    const durations = spans.map(s => s.duration).sort((a, b) => a - b);
    const median = durations[Math.floor(durations.length / 2)];
    const threshold = median * 3;
    spans.forEach(s => { s.isLong = s.duration >= threshold; });
  }

  // Insert break bars between lines with 5+ second gaps
  breakBars = [];
  const BREAK_THRESHOLD = 5;
  // lines are in DOM order; find gaps between consecutive line ends and starts
  // We need to work from the container's actual children order
  // Build a sorted list of { end, nextBegin, insertAfterEl }
  for (let i = 0; i < lines.length - 1; i++) {
    const gap = lines[i + 1].begin - lines[i].end;
    if (gap >= BREAK_THRESHOLD) {
      const barEl = document.createElement('div');
      barEl.className = 'break-bar';
      const secs = Math.round(gap);
      barEl.innerHTML = `<div class="break-bar-label">${secs}s</div><div class="break-bar-track"><div class="break-bar-fill"></div></div>`;
      // Insert into DOM after lines[i].el
      lines[i].el.after(barEl);
      breakBars.push({
        el: barEl,
        fillEl: barEl.querySelector('.break-bar-fill'),
        start: lines[i].end,
        end: lines[i + 1].begin,
        gap
      });
    }
  }

  if (lines.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="big">NO TIMED LINES</div>
      <div class="sub">The file was parsed but contained no word-timed lyric lines.<br>This player requires a TTML file with word-level timing (e.g. from Apple Music). Check that the correct file was uploaded.</div>
    </div>`;
  }

  // Extract <songwriter> tags and append credit line
  const songwriters = Array.from(doc.getElementsByTagName('songwriter'))
    .map(el => el.textContent.trim())
    .filter(Boolean);
  if (songwriters.length > 0) {
    const credit = document.createElement('div');
    credit.className = 'songwriter-credit';
    credit.textContent = 'Written by: ' + songwriters.join(', ');
    container.appendChild(credit);
  }
}

// Strip outer parentheses from a token list's text content
function stripParensFromTokens(tokenList) {
  const result = tokenList.map(t => ({ ...t }));
  // Strip leading paren from first token that contains one
  for (let i = 0; i < result.length; i++) {
    const stripped = result[i].text.replace(/^\s*\(\s*/, '');
    if (stripped !== result[i].text) { result[i].text = stripped; break; }
  }
  // Strip trailing paren from last token that contains one
  for (let i = result.length - 1; i >= 0; i--) {
    const stripped = result[i].text.replace(/\s*\)\s*$/, '');
    if (stripped !== result[i].text) { result[i].text = stripped; break; }
  }
  // Scrub any remaining stray parens from all tokens (e.g. "(Yuh)" as a whole span text)
  result.forEach(t => { t.text = t.text.replace(/[()]/g, ''); });
  return result;
}

// Seek to a specific time
function seekToTime(t) {
  pausedAt = Math.max(0, Math.min(t, duration));
  activeSpanSet = new Set();
  activeLineSet = new Set();
  // Reset highlights
  spans.forEach(s => {
    s.el.classList.remove('active', 'long-word');
    if (s.end <= pausedAt) s.el.classList.add('past');
    else s.el.classList.remove('past');
  });
  lines.forEach(l => l.el.classList.remove('active-line'));
  breakBars.forEach(b => { b.fillEl.style.width = '0%'; b.el.style.opacity = '0.3'; });
  document.getElementById('seek-bar').value = pausedAt;
  document.getElementById('current-time').textContent = formatTime(pausedAt);
  if (isPlaying) startPlayback(pausedAt);
}
// ─── Sync Loop (supports overlapping lines) ───────────────────────────────────
function syncLoop() {
  const t = isPlaying ? (actx.currentTime - startedAt) : pausedAt;

  // ── Spans: find ALL spans active right now ──
  const newActiveSpans = new Set();
  for (let i = 0; i < spans.length; i++) {
    if (t >= spans[i].begin && t < spans[i].end) newActiveSpans.add(i);
  }

  // Spans that just became inactive → mark past
  for (const i of activeSpanSet) {
    if (!newActiveSpans.has(i)) {
      spans[i].el.classList.remove('active', 'long-word');
      if (t >= spans[i].end) spans[i].el.classList.add('past');
    }
  }
  // Spans that just became active
  for (const i of newActiveSpans) {
    if (!activeSpanSet.has(i)) {
      const s = spans[i];
      s.el.classList.add('active');
      s.el.classList.remove('past');
      if (s.isLong) s.el.classList.add('long-word');
      // Retroactively mark all earlier spans on the same line as past.
      // This corrects skipped frames (tab unfocus, freeze) where spans were
      // never individually activated and would otherwise stay greyed out.
      // Bypass for adlib lines with overlapping timing layers (semicolon indicator).
      const lineEntry = lines.find(l => l.el === s.lineEl);
      if (!lineEntry || !lineEntry.skipRetroactive) {
        for (let j = 0; j < i; j++) {
          if (spans[j].lineEl === s.lineEl && !newActiveSpans.has(j)) {
            spans[j].el.classList.remove('active', 'long-word');
            spans[j].el.classList.add('past');
          }
        }
      }
    }
  }
  activeSpanSet = newActiveSpans;

  // ── Lines: find ALL lines active right now ──
  const newActiveLines = new Set();
  for (let i = 0; i < lines.length; i++) {
    if (t >= lines[i].begin && t < lines[i].end) newActiveLines.add(i);
  }

  // Lines that just deactivated
  for (const i of activeLineSet) {
    if (!newActiveLines.has(i)) {
      lines[i].el.classList.remove('active-line');
    }
  }
  // Lines that just activated — add highlight and scroll to the first new one
  let scrollTarget = null;
  for (const i of newActiveLines) {
    if (!activeLineSet.has(i)) {
      lines[i].el.classList.add('active-line');
      if (scrollTarget === null) {
        const isAdlib = lines[i].el.classList.contains('adlib');
        // Don't scroll to an adlib line if there's at least one non-adlib line currently active
        const hasActiveNonAdlib = [...newActiveLines].some(
          j => j !== i && !lines[j].el.classList.contains('adlib')
        );
        if (!isAdlib || !hasActiveNonAdlib) {
          scrollTarget = lines[i].el;
        }
      }
    }
  }
  if (scrollTarget) {
    const container = document.getElementById('lyrics-container');
    const containerRect = container.getBoundingClientRect();
    const lineRect = scrollTarget.getBoundingClientRect();
    const offset = lineRect.top - containerRect.top - (container.clientHeight / 2) + (lineRect.height / 2);
    container.scrollTop += offset;
  }
  activeLineSet = newActiveLines;

  // ── Break bars: update fill for any bar whose window we're inside ──
  for (const bar of breakBars) {
    if (t >= bar.start && t <= bar.end) {
      const pct = ((t - bar.start) / bar.gap) * 100;
      bar.fillEl.style.width = pct.toFixed(2) + '%';
      bar.el.style.opacity = '1';
    } else if (t > bar.end) {
      bar.fillEl.style.width = '100%';
      bar.el.style.opacity = '0.3';
    } else {
      bar.fillEl.style.width = '0%';
      bar.el.style.opacity = '0.3';
    }
  }

  // Progress bar
  if (duration > 0) {
    document.getElementById('seek-bar').value = t;
    document.getElementById('current-time').textContent = formatTime(t);
  }

  rafId = requestAnimationFrame(syncLoop);
}

// ─── Web Audio API State ──────────────────────────────────────────────────────
let actx = null;
let audioBuffer = null;
let sourceNode = null;
let isPlaying = false;
let startedAt = 0;   // actx.currentTime when playback last started
let pausedAt = 0;    // playback offset when paused
let duration = 0;
let playGeneration = 0; // incremented each startPlayback; onended only acts if generation matches

function ensureContext() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}

function startPlayback(offset) {
  ensureContext();
  const gen = ++playGeneration;
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
  sourceNode = actx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(actx.destination);
  sourceNode.onended = () => {
    // Only act if this is still the active playback (not superseded by a seek/restart)
    if (gen !== playGeneration) return;
    if (isPlaying) {
      isPlaying = false;
      pausedAt = 0;
      playIcon.setAttribute('points', '4,2 14,8 4,14');
      cancelAnimationFrame(rafId);
      rafId = null;
      document.getElementById('seek-bar').value = 0;
      document.getElementById('current-time').textContent = '0:00';
      activeSpanSet = new Set();
      activeLineSet = new Set();
      spans.forEach(s => s.el.classList.remove('active', 'long-word', 'past'));
      lines.forEach(l => l.el.classList.remove('active-line'));
      breakBars.forEach(b => { b.fillEl.style.width = '0%'; b.el.style.opacity = '0.3'; });
    }
  };
  startedAt = actx.currentTime - offset;

}

async function startRender() {
  if (!audioBuffer || !spans.length) return;
  const isKaraoke = document.getElementById('chk-karaoke').checked;
  if (isKaraoke) { startKaraokeRender(); return; }

  renderCancelled = false;
  const overlay = document.getElementById('render-overlay');
  const barFill = document.getElementById('render-bar-fill');
  const renderSub = document.getElementById('render-sub');
  overlay.classList.add('active');
  document.getElementById('btn-render').classList.add('rendering');

  const W = 1280, H = 720, FPS = 30;
  const FONT_SIZE = 38;
  const ADLIB_FONT_SIZE = 30;
  const LINE_HEIGHT = 80;       // increased padding between lines
  const ADLIB_LINE_HEIGHT = 60;
  const WRAPPED_EXTRA = 52;     // extra height per wrapped row beyond the first
  const ADLIB_WRAPPED_EXTRA = 42;
  const LEFT_PAD = 80;
  const RIGHT_PAD = 80;
  const MAX_TEXT_W = W - LEFT_PAD - RIGHT_PAD;

  // Read CSS variables so the render matches the current theme
  const cs = getComputedStyle(document.documentElement);
  const BG       = cs.getPropertyValue('--bg').trim()          || '#0a0a0f';
  const COL_DIM   = cs.getPropertyValue('--text-dim').trim()   || '#3a3a55';
  const COL_MID   = cs.getPropertyValue('--text-mid').trim()   || '#6a6a9a';
  const COL_BRIGHT = cs.getPropertyValue('--text-bright').trim()|| '#c8c8e8';
  const COL_ACTIVE = cs.getPropertyValue('--accent').trim()    || '#e8f440';
  const COL_BORDER = cs.getPropertyValue('--border').trim()    || '#1e1e2e';
  const JITTER_DUR = 0.060;
  // Scroll smoothing: lerp speed (higher = snappier, lower = smoother)
  const SCROLL_LERP = 4.0; // units: per second

  function easeOutExpo(t) { return 1 - Math.pow(1 - t, 3.5); }

  function getSpanY(span, t) {
    if (t < span.begin) return 2;
    if (t >= span.end) return 0;
    const elapsed = t - span.begin;
    const wordDur = span.end - span.begin;
    if (elapsed < JITTER_DUR) return 2 + 3 * (elapsed / JITTER_DUR);
    const p = Math.min((elapsed - JITTER_DUR) / Math.max(wordDur - JITTER_DUR, 0.001), 1);
    return 5 * (1 - easeOutExpo(p));
  }

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── Build ordered segment list from DOM (preserves spaces) ──
  function buildLineSegments(lineEl, lineSpans) {
    const segments = [];
    const spanByEl = new Map(lineSpans.map(s => [s.el, s]));
    function walk(node) {
      for (const child of node.childNodes) {
        if (child.nodeType === Node.TEXT_NODE) {
          if (child.textContent) segments.push({ span: null, text: child.textContent });
        } else if (child.classList && child.classList.contains('lyric-span')) {
          segments.push({ span: spanByEl.get(child), text: child.textContent });
        } else {
          walk(child);
        }
      }
    }
    walk(lineEl);
    return segments;
  }

  // ── Word-wrap segments into rows, never breaking within a word ──
  // Groups consecutive span segments (no whitespace between) into atomic units
  // before packing rows, so syllable-split words always stay together.
  function wrapSegments(segments, fontSize) {
    ctx.font = `${fontSize}px "DM Mono", monospace`;

    // Step 1: build atomic units — runs of adjacent spans = one unbreakable word
    const units = [];
    let i = 0;
    while (i < segments.length) {
      const seg = segments[i];
      if (seg.span === null) {
        const tw = ctx.measureText(seg.text).width;
        units.push({ segs: [{ ...seg, width: tw }], width: tw, isSpace: true });
        i++;
      } else {
        const run = [];
        let runW = 0;
        while (i < segments.length && segments[i].span !== null) {
          const tw = ctx.measureText(segments[i].text).width;
          run.push({ ...segments[i], width: tw });
          runW += tw;
          i++;
          // If this span's text ends with whitespace, it's a word boundary — end the run
          if (/\s$/.test(segments[i - 1].text)) break;
        }
        units.push({ segs: run, width: runW, isSpace: false });
      }
    }

    // Step 2: greedy row packing — break only on space units
    const rows = [];
    let currentRow = [];
    let currentW = 0;
    for (const unit of units) {
      if (currentRow.length === 0 && unit.isSpace) continue; // skip leading space on new row
      if (currentW + unit.width > MAX_TEXT_W && currentRow.length > 0) {
        rows.push(currentRow);
        currentRow = [];
        currentW = 0;
        if (unit.isSpace) continue;
      }
      for (const seg of unit.segs) currentRow.push(seg);
      currentW += unit.width;
    }
    if (currentRow.length > 0) rows.push(currentRow);
    return rows;
  }

  // ── Build layout with wrapped rows ──
  const layout = [];
  let curY = 0;
  ctx.font = `${FONT_SIZE}px "DM Mono", monospace`;

  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    const isAdlib = l.el.classList.contains('adlib');
    const agent = l.el.dataset.agent;
    const fs = isAdlib ? ADLIB_FONT_SIZE : FONT_SIZE;
    const lh = isAdlib ? ADLIB_LINE_HEIGHT : LINE_HEIGHT;
    const wExtra = isAdlib ? ADLIB_WRAPPED_EXTRA : WRAPPED_EXTRA;
    const lineSpans = spans.filter(s => s.lineEl === l.el);
    const segments = buildLineSegments(l.el, lineSpans);
    const rows = wrapSegments(segments, fs);
    const totalH = lh + (rows.length - 1) * wExtra;

    layout.push({ lineObj: l, y: curY, isAdlib, agent, fontSize: fs,
                  lineHeight: lh, wExtra, rows, totalH, i });
    curY += totalH;
    if (breakBars.some(b => b.start === l.end)) curY += 56;
  }

  const creditEl = document.querySelector('.songwriter-credit');
  const creditText = creditEl ? creditEl.textContent : null;

  clearRenderPreview();

  // ── Audio + MediaRecorder ──
  const canvasStream = canvas.captureStream(FPS);
  const renderACtx = new AudioContext();
  const dest = renderACtx.createMediaStreamDestination();
  const audioSource = renderACtx.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.connect(dest);

  const combinedStream = new MediaStream([
    ...canvasStream.getVideoTracks(),
    ...dest.stream.getAudioTracks()
  ]);

  const mimeTypes = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
  const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
  const recorder = new MediaRecorder(combinedStream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  recorder.start(100);
  audioSource.start(0);
  const audioStartTime = renderACtx.currentTime;

}
// ─── Karaoke-Style Video Renderer ─────────────────────────────────────────────
// ── Minimal WebM muxer (VP9 + Opus, no external lib needed) ──────────────────
// Encodes a sequence of pre-encoded VP9 video chunks and raw Opus audio into
// a valid WebM container using hand-written EBML.  Supports only what we need:
// one video track, one audio track, simple block structure, no seeking index.
// ─── Karaoke-Style Video Renderer ─────────────────────────────────────────────
async function startKaraokeRender() {
  renderCancelled = false;
  const overlay = document.getElementById('render-overlay');
  const barFill = document.getElementById('render-bar-fill');
  const renderSub = document.getElementById('render-sub');
  overlay.classList.add('active');
  document.getElementById('btn-render').classList.add('rendering');

  const W = 1280, H = 720, FPS = 30;
  const FONT_SIZE = 52;
  const ADLIB_FONT_SIZE = 38;
  const LINE_H = 80;
  const MAX_LINES = 5;
  const CENTER_X = W / 2;
  const BLOCK_Y_START = H / 2 - ((MAX_LINES * LINE_H) / 2);
  const MAX_LINE_PX = W - 160; // max rendered line width before wrapping

  const cs = getComputedStyle(document.documentElement);
  const BG         = cs.getPropertyValue('--bg').trim()          || '#0a0a0f';
  const COL_DIM    = cs.getPropertyValue('--text-dim').trim()    || '#3a3a55';
  const COL_MID    = cs.getPropertyValue('--text-mid').trim()    || '#6a6a9a';
  const COL_BRIGHT = cs.getPropertyValue('--text-bright').trim() || '#c8c8e8';
  const COL_ACTIVE = cs.getPropertyValue('--accent').trim()      || '#e8f440';
  const COL_ACTIVE2= cs.getPropertyValue('--accent2').trim()     || '#ff4d6d';

  const JITTER_DUR = 0.060;
  function easeOutExpo(x) { return 1 - Math.pow(1 - x, 3.5); }
  function getSpanYOffset(span, t) {
    if (t < span.begin) return 2;
    if (t >= span.end) return 0;
    const elapsed = t - span.begin;
    const wordDur = span.end - span.begin;
    if (elapsed < JITTER_DUR) return 2 + 3 * (elapsed / JITTER_DUR);
    const p = Math.min((elapsed - JITTER_DUR) / Math.max(wordDur - JITTER_DUR, 0.001), 1);
    return 5 * (1 - easeOutExpo(p));
  }

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── Step 1: walk DOM to collect tokens (spans + spacing) per line ─────────────
  // A "token" is either a timed span or a text-node (spacing/punctuation between spans).
  // We preserve ALL text nodes (including pure-space ones) so spacing is never lost.
  //
  // Result per source line: array of tokens:
  //   { type:'span', begin, end, text }   — a timed word chunk
  //   { type:'text', text }               — inter-span text (spaces, punctuation)

  function collectLineTokens(lineEl, lineSpans) {
    const spanByEl = new Map(lineSpans.map(s => [s.el, s]));
    const tokens = [];
    function walk(node) {
      for (const child of node.childNodes) {
        if (child.nodeType === Node.TEXT_NODE) {
          if (child.textContent) tokens.push({ type: 'text', text: child.textContent });
        } else if (child.classList && child.classList.contains('lyric-span')) {
          const s = spanByEl.get(child);
          if (s) tokens.push({ type: 'span', begin: s.begin, end: s.end, text: child.textContent });
        } else if (child.childNodes && child.childNodes.length) {
          walk(child);
        }
      }
    }
    walk(lineEl);
    return tokens;
  }

  // ── Step 2: merge tokens into "words" ─────────────────────────────────────────
  // A "word" is a run of consecutive span tokens that are NOT separated by
  // whitespace text nodes.  Text nodes that contain only whitespace are word
  // boundaries; text nodes with non-whitespace content (punctuation) are glued
  // onto the preceding span.
  //
  // Each word: { spans:[{begin,end,text}], trailSpace:string, totalText:string }
  // trailSpace is the whitespace text node that follows this word (may be '').

  function tokensToWords(tokens) {
    const words = [];
    let i = 0;
    while (i < tokens.length) {
      const tok = tokens[i];
      if (tok.type === 'text') {
        // pure text token between words — attach to previous word's trail if whitespace,
        // or glue onto the last span if non-whitespace (e.g. bare punctuation)
        if (/^\s+$/.test(tok.text)) {
          if (words.length) words[words.length - 1].trailSpace += tok.text;
        } else {
          // non-whitespace text node (rare): glue onto last span's text
          if (words.length) words[words.length - 1].spans[words[words.length-1].spans.length-1].text += tok.text;
        }
        i++;
      } else {
        // span token — start a new word, consuming adjacent spans with no space between
        const wordSpans = [];
        let trailSpace = '';
        while (i < tokens.length) {
          const cur = tokens[i];
          if (cur.type === 'span') {
            wordSpans.push({ begin: cur.begin, end: cur.end, text: cur.text });
            i++;
            // Look ahead: if next token is a text-node with only whitespace → word boundary
            // If next token is a text-node with non-whitespace → glue it onto this span
            // If next token is another span → continue the word (no space between)
            if (i < tokens.length) {
              const nxt = tokens[i];
              if (nxt.type === 'text') {
                if (/^\s+$/.test(nxt.text)) {
                  trailSpace = nxt.text;
                  i++; // consume the space
                  break; // word boundary
                } else {
                  // non-whitespace text glued to this span
                  wordSpans[wordSpans.length - 1].text += nxt.text;
                  i++; // consume punctuation text node, then continue word
                }
              }
              // else: next is another span → loop continues, part of same word
            }
          } else {
            break;
          }
        }
        if (wordSpans.length) {
          words.push({ spans: wordSpans, trailSpace });
        }
      }
    }
    return words;
  }

  function wordListWidth(words, fs) {
    ctx.font = `bold ${fs}px "DM Mono", monospace`;
    let w = 0;
    for (let i = 0; i < words.length; i++) {
      for (const s of words[i].spans) w += ctx.measureText(s.text).width;
      if (i < words.length - 1) w += ctx.measureText(words[i].trailSpace || ' ').width;
    }
    return w;
  }

  // Returns the split index (words[0..splitIdx-1] / words[splitIdx..end]),
  // or -1 if the word list fits. Tries punctuation first, then word-boundary midpoint.
  // Also returns { splitIdx, isPunctSplit } so callers know whether to capitalise.
  function findSplitPoint(words, fs) {
    if (wordListWidth(words, fs) <= MAX_LINE_PX) return null; // fits

    const SPLIT_CHARS = /[,?!"]/;

    // 1. Prefer last punctuation mark that isn't at the very last word
    let punctSplit = -1;
    for (let i = 0; i < words.length - 1; i++) {
      const lastText = words[i].spans[words[i].spans.length - 1].text.trimEnd();
      if (SPLIT_CHARS.test(lastText[lastText.length - 1])) {
        punctSplit = i + 1;
      }
    }
    if (punctSplit > 0) return { splitIdx: punctSplit, isPunctSplit: true };

    // 2. Fallback: split at the word boundary closest to the midpoint
    // (never split two spans that have no space between them — those are already
    //  one "word" object so they arrive here as a single words[] entry)
    if (words.length < 2) return null; // can't split a single word
    const mid = Math.floor(words.length / 2);
    return { splitIdx: mid, isPunctSplit: false };
  }

  // ── Step 5: compute total pixel width of a word list ──────────────────────────
  function rowPixelWidth(words, fs) {
    return wordListWidth(words, fs);
  }

  // ── Step 6: capitalise first letter of first span in a word list ──────────────
  function capitaliseFirstSpan(words) {
    if (!words.length || !words[0].spans.length) return;
    const s = words[0].spans[0];
    s.text = s.text.charAt(0).toUpperCase() + s.text.slice(1);
  }

  // ── Step 7: strip trailing comma from last span of last word ─────────────────
  function stripTrailingComma(words) {
    if (!words.length) return;
    const lastWord = words[words.length - 1];
    const lastSpan = lastWord.spans[lastWord.spans.length - 1];
    lastSpan.text = lastSpan.text.replace(/,\s*$/, '');
  }

  // ── Step 8: recursively split a word list into kLines that each fit MAX_LINE_PX ─
  // Each resulting piece becomes its own kLine (one display row, no wrapping).
  function splitIntoKLines(words, lineBegin, lineEnd, isAdlib, isV2, agent, fs) {
    const split = findSplitPoint(words, fs);
    if (!split) {
      // Fits — emit as one kLine
      ctx.font = `bold ${fs}px "DM Mono", monospace`;
      for (const w of words) {
        for (const s of w.spans) s.width = ctx.measureText(s.text).width;
      }
      const rowW = rowPixelWidth(words, fs);
      kLines.push({ begin: lineBegin, end: lineEnd, isAdlib, isV2, agent, fs,
                    rows: [{ words, rowW }], appearAt: lineBegin - APPEAR_BEFORE });
      return;
    }

    const { splitIdx, isPunctSplit } = split;
    const part1 = words.slice(0, splitIdx);
    const part2 = words.slice(splitIdx);

    if (isPunctSplit) {
      // Strip trailing comma from end of part1 (but keep ? ! ")
      stripTrailingComma(part1);
      // Capitalise start of part2
      capitaliseFirstSpan(part2);
    }
    // (If it's a pure word-boundary split, no capitalisation change)

    const part1End = part1[part1.length - 1].spans[part1[part1.length - 1].spans.length - 1].end;
    const part2Begin = part2[0].spans[0].begin;

    // Recurse — each part may itself still be too long
    splitIntoKLines(part1, lineBegin, part1End, isAdlib, isV2, agent, fs);
    splitIntoKLines(part2, part2Begin, lineEnd, isAdlib, isV2, agent, fs);
  }

  // ── Step 9: build kLines from all source lines ────────────────────────────────
  const kLines = [];
  const APPEAR_BEFORE = 1.5;

  for (const l of lines) {
    const isAdlib = l.el.classList.contains('adlib');
    const agent = l.el.dataset.agent || 'v1';
    const isV2 = agent === 'v2';
    const fs = isAdlib ? ADLIB_FONT_SIZE : FONT_SIZE;

    const lineSpans = spans.filter(s => s.lineEl === l.el);
    if (!lineSpans.length) continue;

    const tokens = collectLineTokens(l.el, lineSpans);
    let words = tokensToWords(tokens);
    if (!words.length) continue;

    if (isAdlib) {
      words[0].spans[0].text = '(' + words[0].spans[0].text;
      const lw = words[words.length - 1];
      lw.spans[lw.spans.length - 1].text = lw.spans[lw.spans.length - 1].text.trimEnd() + ')';
    }

    splitIntoKLines(words, l.begin, l.end, isAdlib, isV2, agent, fs);
  }

  // ── Slot assignment ───────────────────────────────────────────────────────────
  const slotContents = new Array(MAX_LINES).fill(-1);
  const lineSlot = new Array(kLines.length).fill(-1);

  const appearOrder = kLines.map((_,i)=>i).sort((a,b)=>kLines[a].appearAt - kLines[b].appearAt);
  for (const idx of appearOrder) {
    const kl = kLines[idx];
    let slot = slotContents.indexOf(-1);

      let oldestEnd = Infinity, oldestSlot = -1;
      for (let s = 0; s < MAX_LINES; s++) {
        const occ = slotContents[s];
        if (occ !== -1 && kLines[occ].end <= kl.appearAt && kLines[occ].end < oldestEnd) {
          oldestEnd = kLines[occ].end; oldestSlot = s;
        }

      if (oldestSlot !== -1) {
        slot = oldestSlot;
      } else {
        let oldest = Infinity, oldestS = 0;
        for (let s = 0; s < MAX_LINES; s++) {
          const occ = slotContents[s];
          if (occ !== -1 && kLines[occ].begin < oldest) { oldest = kLines[occ].begin; oldestS = s; }
        }

  if (kLines.length && kLines[0].begin > 1.0) {
    countdowns.push({ countStart: 0, countEnd: kLines[0].begin, nextLineIdx: 0 });
  }
  for (let i = 0; i < kLines.length - 1; i++) {
    const gap = kLines[i+1].begin - kLines[i].end;

    }
  }

  const lastSpanEnd = spans.length ? Math.max(...spans.map(s => s.end)) : duration;
  const creditEl = document.querySelector('.songwriter-credit');
  const creditText = creditEl ? creditEl.textContent : null;
  const CREDIT_FADE_START = lastSpanEnd + 0.5;
  const CREDIT_FADE_DUR   = 2.0;
  const LYRIC_FADE_DUR    = 1.0;

  // ── Serialize kLines for worker transfer ──────────────────────────────────────
  // ── Fallback: real-time MediaRecorder path ──────────────────────────────────

  // Implements all the same fade/fresh-canvas logic as the offline path.

  const FADE_DUR = 0.4;

  function getActiveCountdown_rt(t) {
    return countdowns.find(c => t >= c.countStart && t < c.countEnd) || null;
  }
  function getLastEnteredGap_rt(t) {
    let last = null;
    for (const cd of countdowns) {

    }
    return last;

  function countdownAlpha_rt(t, cd) {
    return Math.min(Math.min(1, (t - cd.countStart) / FADE_DUR), Math.min(1, (cd.countEnd - t) / FADE_DUR));
  }

  function getVisibleLines_rt(t, gapEnd) {
    const ge = gapEnd ?? -Infinity;
    const slotNow = new Array(MAX_LINES).fill(-1);
    for (let i = 0; i < kLines.length; i++) {
      const kl   = kLines[i];
      const slot = lineSlot[i];
      if (slot === -1 || t < kl.appearAt || kl.begin < ge) continue;
      let evicted = false;
      for (let j = i + 1; j < kLines.length; j++) {
        if (lineSlot[j] === slot && kLines[j].begin >= ge && t >= kLines[j].appearAt) { evicted = true; break; }
      }
      if (!evicted) slotNow[slot] = i;
    }
    return slotNow;
  }

  function slotY(slot) { return BLOCK_Y_START + slot * LINE_H + LINE_H / 2; }

  function drawKaraokeRow_rt(t, kl, slotYCenter, globalAlpha) {
    const fs = kl.fs;
    ctx.font = `bold ${fs}px "DM Mono", monospace`;
    ctx.textBaseline = 'middle';
    const isActive = t >= kl.begin && t < kl.end;
    const isPast   = kl.end <= t;
    let alpha = 1.0;
    if (t < kl.appearAt)   alpha = 0;
    else if (t < kl.begin) alpha = Math.min(1, (t - kl.appearAt) / Math.min(APPEAR_BEFORE, 0.5));
    if (kl.isAdlib) alpha *= 0.75;
    alpha *= globalAlpha;
    if (alpha <= 0) return;

    const sweepColor = kl.isV2 ? COL_ACTIVE2 : COL_ACTIVE;
    const baseColor  = isActive ? COL_MID : (isPast ? COL_BRIGHT : COL_DIM);

    const allSpans = [];
    let cumW = 0;
    const rowOffs = [];
    for (let ri = 0; ri < kl.rows.length; ri++) {
      rowOffs.push(cumW);
      for (let wi = 0; wi < kl.rows[ri].words.length; wi++) {
        const w = kl.rows[ri].words[wi];
        for (const s of w.spans) { allSpans.push({ s, lineOffset: cumW }); cumW += s.width; }
        if (wi < kl.rows[ri].words.length - 1 && w.trailSpace) cumW += ctx.measureText(w.trailSpace).width;
      }
    }

    let sweepPx;
    if (isPast)        sweepPx = cumW + 1;
    else if (!isActive) sweepPx = -1;
    else {
      sweepPx = 0;
      for (const { s, lineOffset } of allSpans) {
        if (t >= s.end)        sweepPx = lineOffset + s.width;
        else if (t >= s.begin) { sweepPx = lineOffset + (t - s.begin) / Math.max(s.end - s.begin, 0.001) * s.width; break; }
        else break;
      }
    }

    let activeBeg = -1;
    if (isActive) { for (const { s } of allSpans) { if (t >= s.begin && t < s.end) { activeBeg = s.begin; break; } } }

    for (let ri = 0; ri < kl.rows.length; ri++) {
      const row = kl.rows[ri];
      const startX = CENTER_X - row.rowW / 2;
      const rowSweep = sweepPx - rowOffs[ri];
      let xC = startX;
      for (let wi = 0; wi < row.words.length; wi++) {
        const w = row.words[wi];
        for (const s of w.spans) {
          const lx = xC - startX;
          const sp = rowSweep - lx;
          const sf = Math.max(0, Math.min(1, sp / Math.max(s.width, 1)));
          const drawY = slotYCenter + ri * LINE_H + getSpanYOffset(s, t);
          ctx.globalAlpha = alpha;
          if (sf <= 0) { ctx.fillStyle = baseColor; ctx.fillText(s.text, xC, drawY); }
          else if (sf >= 1) { ctx.fillStyle = sweepColor; ctx.fillText(s.text, xC, drawY); }
          else {
            ctx.fillStyle = baseColor; ctx.fillText(s.text, xC, drawY);
            ctx.save(); ctx.beginPath(); ctx.rect(xC, drawY - fs, sp, fs * 2); ctx.clip();
            ctx.shadowColor = sweepColor; ctx.shadowBlur = 14; ctx.fillStyle = sweepColor; ctx.fillText(s.text, xC, drawY);
            ctx.shadowBlur = 0; ctx.restore();
          }
          if (s.begin === activeBeg) {
            ctx.save(); ctx.globalAlpha = alpha * 0.5; ctx.shadowColor = sweepColor; ctx.shadowBlur = 22;
            ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillText(s.text, xC, drawY); ctx.restore();
          }
          xC += s.width;
        }
        if (wi < row.words.length - 1 && w.trailSpace) {
          ctx.globalAlpha = alpha; ctx.fillStyle = baseColor;
          ctx.fillText(w.trailSpace, xC, slotYCenter + ri * LINE_H);
          xC += ctx.measureText(w.trailSpace).width;
        }
      }
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
  }

  function drawCountdown_rt(t, cd, cdAlpha) {
    if (cdAlpha <= 0) return;
    const remaining = cd.countEnd - t;
    const countNum  = Math.ceil(remaining);
    if (countNum <= 0) return;
    const frac  = remaining - Math.floor(remaining);
    const scale = 1 + 0.15 * Math.pow(1 - frac, 3);
    const nA    = (0.4 + 0.6 * Math.pow(1 - frac, 2)) * cdAlpha;
    const prog  = Math.min(1, (t - cd.countStart) / (cd.countEnd - cd.countStart));
    const barX  = CENTER_X - 200, barY = H - 80;
    ctx.globalAlpha = 0.3 * cdAlpha; ctx.fillStyle = COL_MID; ctx.fillRect(barX, barY, 400, 3);
    ctx.globalAlpha = cdAlpha;       ctx.fillStyle = COL_ACTIVE; ctx.fillRect(barX, barY, 400 * prog, 3);
    ctx.save();
    ctx.globalAlpha = nA;
    ctx.font = `bold ${Math.round(120 * scale)}px "DM Mono", monospace`;
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.fillStyle = COL_ACTIVE; ctx.shadowColor = COL_ACTIVE; ctx.shadowBlur = 30;
    ctx.fillText(String(countNum), CENTER_X, H / 2);
    ctx.shadowBlur = 0; ctx.restore();
    ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left'; ctx.globalAlpha = 1;
  }

  function drawCredits_rt(t) {
    if (!creditText || t < CREDIT_FADE_START) return;
    const alpha = Math.min(1, (t - CREDIT_FADE_START) / CREDIT_FADE_DUR) * 0.9;
    if (alpha <= 0) return;
    ctx.font = `bold 28px "DM Mono", monospace`; ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.fillStyle = COL_BRIGHT; ctx.globalAlpha = alpha;
    const maxW = W - 200, wds = creditText.split(' ');
    const cls = []; let ln = '';
    for (const wd of wds) { const t2 = ln ? ln + ' ' + wd : wd; if (ctx.measureText(t2).width > maxW && ln) { cls.push(ln); ln = wd; } else ln = t2; }
    if (ln) cls.push(ln);
    const lh = 42; let cy = H / 2 - cls.length * lh / 2 + lh / 2;
    for (const cl of cls) { ctx.fillText(cl, CENTER_X, cy); cy += lh; }
    ctx.globalAlpha = 1; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  function drawFrame_rt(t) {
    ctx.clearRect(0, 0, W, H); ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
    let lyricAlpha = 1;
    if (creditText && t >= CREDIT_FADE_START) lyricAlpha = Math.max(0, 1 - (t - CREDIT_FADE_START) / LYRIC_FADE_DUR);

    const cd      = getActiveCountdown_rt(t);
    const lastGap = getLastEnteredGap_rt(t);

    if (cd) {
      const cdA  = countdownAlpha_rt(t, cd);
      const lyrA = Math.min(1, (1 - (t - cd.countStart) / FADE_DUR)) * lyricAlpha;
      if (lyrA > 0) {
        const slotNow = getVisibleLines_rt(t, cd.countEnd);
        for (let slot = 0; slot < MAX_LINES; slot++) {
          const idx = slotNow[slot];
          if (idx !== -1 && kLines[idx].appearAt <= t) drawKaraokeRow_rt(t, kLines[idx], slotY(slot), lyrA);
        }
      }
      drawCountdown_rt(t, cd, cdA);
    } else {
      const gapEnd = lastGap ? lastGap.countEnd : -Infinity;
      if (lyricAlpha > 0) {
        const slotNow = getVisibleLines_rt(t, gapEnd);
        for (let slot = 0; slot < MAX_LINES; slot++) {
          const idx = slotNow[slot];
          if (idx !== -1) drawKaraokeRow_rt(t, kLines[idx], slotY(slot), lyricAlpha);
        }
      }
      // Outgoing countdown: brief fade-out of number after gap ends
      for (const c of countdowns) {
        if (t >= c.countEnd && t < c.countEnd + FADE_DUR) {
          drawCountdown_rt(c.countEnd - 0.001, c, 1 - (t - c.countEnd) / FADE_DUR);
        }
      }
    }
    if (t >= CREDIT_FADE_START) drawCredits_rt(t);
  }

  // Canvas + audio setup
  clearRenderPreview();
  const canvasStream = canvas.captureStream(FPS);
  const renderACtx   = new AudioContext();
  const dest         = renderACtx.createMediaStreamDestination();
  const audioSrc     = renderACtx.createBufferSource();
  audioSrc.buffer    = audioBuffer;
  audioSrc.connect(dest);
  const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
  const mimeTypes = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  const mimeType  = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
  const recorder  = new MediaRecorder(combinedStream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks    = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.start(100);
  audioSrc.start(0);
  const audioStartTime = renderACtx.currentTime;

  let renderDone = false;
  function doKaraokeTick() {
    if (renderCancelled || renderDone) return;
    const t = Math.max(renderACtx.currentTime - audioStartTime, 0);
    if (t > duration + 3.5) {
      renderDone = true;
      recorder.stop();
      try { audioSrc.stop(); } catch(_) {}
      renderACtx.close();
      clearInterval(intervalId);
      return;
    }
    drawFrame_rt(t);
    updateRenderPreview(canvas);
    const pct = Math.min(t / (duration + 3) * 100, 100);
    barFill.style.width = pct.toFixed(1) + '%';
    renderSub.textContent = formatTime(t) + ' / ' + formatTime(duration);
  }

  const intervalId = setInterval(doKaraokeTick, 1000 / FPS);

  recorder.onstop = () => {
    clearInterval(intervalId);
    overlay.classList.remove('active');
    document.getElementById('btn-render').classList.remove('rendering');
    if (!renderCancelled) {
      const blob = new Blob(chunks, { type: mimeType });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'lyrics-karaoke.webm'; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 10_000);
    }
  };
}

// ─── Contributors Dropdown ────────────────────────────────────────────────────
const contribBtn = document.getElementById('contributors-btn');
const contribMenu = document.getElementById('contributors-menu');
contribBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  contribMenu.classList.toggle('open');
});
document.addEventListener('click', () => contribMenu.classList.remove('open'));
contribMenu.addEventListener('click', (e) => e.stopPropagation());

// ─── UI Customizer ────────────────────────────────────────────────────────────
const THEME_KEY = 'ttml-renderer-theme';
const DEFAULTS = {
  '--accent':      '#e8f440',
  '--accent2':     '#ff4d6d',
  '--bg':          '#0a0a0f',
  '--surface':     '#111118',
  '--border':      '#1e1e2e',
  '--text-bright': '#c8c8e8',
  '--text-mid':    '#6a6a9a',
  '--text-dim':    '#3a3a55'
};

// accent controls both --accent and --active-word
const PICKER_MAP = {
  'pick-accent':      '--accent',
  'pick-accent2':     '--accent2',
  'pick-bg':          '--bg',
  'pick-surface':     '--surface',
  'pick-border':      '--border',
  'pick-text-bright': '--text-bright',
  'pick-text-mid':    '--text-mid',
  'pick-text-dim':    '--text-dim'
};

const designPanel = document.getElementById('design-panel');

function hexToRGBA(hex, alpha) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  const r = parseInt(hex.substring(0,2),16);
  const g = parseInt(hex.substring(2,4),16);
  const b = parseInt(hex.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const glowStyleEl = document.createElement('style');
glowStyleEl.id = 'dynamic-glow';
document.head.appendChild(glowStyleEl);

function syncAccentDerived(color) {
  // Keep --active-word in sync with --accent
  document.documentElement.style.setProperty('--active-word', color);
  document.documentElement.style.setProperty('--active-line', hexToRGBA(color, 0.06));
  glowStyleEl.textContent = `
    .lyric-span.active {
      text-shadow: 0 0 20px ${hexToRGBA(color, 0.4)} !important;
    }
    .lyric-span.active.long-word {
      animation:
        word-jitter 60ms linear forwards,
        float-up var(--word-dur, 0.3s) cubic-bezier(0.22, 1, 0.36, 1) forwards 60ms,
        word-glow-dynamic 0.8s ease-in-out infinite 60ms !important;
    }
    @keyframes word-glow-dynamic {
      0%   { text-shadow: 0 0 10px ${hexToRGBA(color, 0.5)}; }
      50%  { text-shadow: 0 0 30px ${hexToRGBA(color, 0.9)}, 0 0 60px ${hexToRGBA(color, 0.4)}; }
      100% { text-shadow: 0 0 10px ${hexToRGBA(color, 0.5)}; }
    }
  `;
}

// Load saved theme
(function loadTheme() {
  try {
    const saved = JSON.parse(localStorage.getItem(THEME_KEY));
    if (saved) {
      Object.entries(saved).forEach(([prop, val]) => {
        document.documentElement.style.setProperty(prop, val);
      });
      Object.entries(PICKER_MAP).forEach(([pickerId, cssVar]) => {
        if (saved[cssVar]) {
          document.getElementById(pickerId).value = saved[cssVar];
          const hexEl = document.getElementById(pickerId.replace('pick-','hex-'));
          if (hexEl) hexEl.value = saved[cssVar];
        }
      });
      if (saved['--accent']) syncAccentDerived(saved['--accent']);
    }
  } catch(e) {}
})();

document.getElementById('btn-design').addEventListener('click', () => {
  designPanel.classList.toggle('active');
});
document.getElementById('design-close').addEventListener('click', () => {
  designPanel.classList.remove('active');
});

function applyColor(cssVar, hexVal, pickerId) {
  document.documentElement.style.setProperty(cssVar, hexVal);
  document.getElementById(pickerId).value = hexVal;
  document.getElementById(pickerId.replace('pick-','hex-')).value = hexVal;
  if (cssVar === '--accent') syncAccentDerived(hexVal);
  saveTheme();
}

function bindPicker(pickerId, cssVar) {
  const hexId = pickerId.replace('pick-','hex-');
  document.getElementById(pickerId).addEventListener('input', (e) => {
    applyColor(cssVar, e.target.value, pickerId);
  });
  document.getElementById(hexId).addEventListener('input', (e) => {
    let val = e.target.value.trim();
    if (!val.startsWith('#')) val = '#' + val;
    if (/^#[0-9a-fA-F]{6}$/.test(val)) applyColor(cssVar, val, pickerId);
  });
  document.getElementById(hexId).addEventListener('blur', (e) => {
    let val = e.target.value.trim();
    if (!val.startsWith('#')) val = '#' + val;
    if (/^#[0-9a-fA-F]{3}$/.test(val)) {
      val = '#'+val[1]+val[1]+val[2]+val[2]+val[3]+val[3];
      applyColor(cssVar, val, pickerId);
    }
  });
}
Object.entries(PICKER_MAP).forEach(([pickerId, cssVar]) => bindPicker(pickerId, cssVar));

function saveTheme() {
  const theme = {};
  Object.values(PICKER_MAP).forEach(prop => {
    theme[prop] = getComputedStyle(document.documentElement).getPropertyValue(prop).trim();
  });
  localStorage.setItem(THEME_KEY, JSON.stringify(theme));
}

document.getElementById('design-reset').addEventListener('click', () => {
  localStorage.removeItem(THEME_KEY);
  Object.entries(DEFAULTS).forEach(([prop, val]) => {
    document.documentElement.style.setProperty(prop, val);
  });
  Object.entries(PICKER_MAP).forEach(([pickerId, cssVar]) => {
    document.getElementById(pickerId).value = DEFAULTS[cssVar];
    document.getElementById(pickerId.replace('pick-','hex-')).value = DEFAULTS[cssVar];
  });
  syncAccentDerived(DEFAULTS['--accent']);
});
</script>
